name: Publish

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run checks
              run: npm run check

            - name: Publish to npm
              run: |
                  echo "Dry run: npm publish would run for ${GITHUB_REF_NAME}."
                  echo "Uncomment the npm publish command after validating this workflow."
                  # npm publish
