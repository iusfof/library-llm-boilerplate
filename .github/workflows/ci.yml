name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    check:
        name: Node ${{ matrix.node-version }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                node-version:
                    - 20
                    - 22
                    - 24

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run checks
              run: npm run check
